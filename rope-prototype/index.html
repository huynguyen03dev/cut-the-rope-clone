<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Verlet Rope — Cut the Rope prototype</title>
<style>
  :root { color-scheme: dark; }
  html,body { margin:0; height:100%; background:#111; color:#ddd;
              font:13px/1.4 ui-monospace,Menlo,Consolas,monospace; overflow:hidden; }
  #wrap { position:fixed; inset:0; display:grid; grid-template-rows:1fr auto; }
  canvas { display:block; width:100%; height:100%; touch-action:none; cursor:crosshair; }
  #panel { background:#1b1b1b; border-top:1px solid #333; padding:8px 12px;
           display:flex; flex-wrap:wrap; gap:14px 22px; align-items:center; }
  .ctl { display:flex; flex-direction:column; gap:2px; min-width:120px; }
  .ctl label { font-size:11px; color:#9ab; }
  .ctl input[type=range] { width:130px; accent-color:#6cf; }
  .val { color:#6cf; }
  #hint { color:#789; }
  b { color:#fff; }
  button { background:#2a2a2a; color:#ddd; border:1px solid #444; border-radius:4px;
           padding:5px 10px; cursor:pointer; font:inherit; }
  button:hover { background:#333; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="panel">
    <div class="ctl"><label>segments</label><input id="segs" type="range" min="4" max="24" value="12"><span class="val" id="segsV"></span></div>
    <div class="ctl"><label>iterations</label><input id="iters" type="range" min="1" max="40" value="16"><span class="val" id="itersV"></span></div>
    <div class="ctl"><label>damping</label><input id="damp" type="range" min="80" max="100" value="99"><span class="val" id="dampV"></span></div>
    <div class="ctl"><label>candy invMass</label><input id="cim" type="range" min="1" max="100" value="5"><span class="val" id="cimV"></span></div>
    <div class="ctl"><label>gravity</label><input id="grav" type="range" min="0" max="3000" value="1400"><span class="val" id="gravV"></span></div>
    <div class="ctl"><label>buoyancy</label><input id="buoy" type="range" min="100" max="300" value="160"><span class="val" id="buoyV"></span></div>
    <button id="reset">reset</button>
    <button id="addRope">+ rope</button>
    <button id="addBubble">+ bubble</button>
    <span id="hint">swipe to cut · tap a <b>bubble</b> to pop · bubble lifts the candy</span>
  </div>
</div>

<script>
"use strict";
// ---------------------------------------------------------------------------
// Verlet rope prototype — faithful port of DESIGN.md §2.
//   - Fixed timestep 1/60 with accumulator + render interpolation
//   - Verlet integration with damping
//   - Mass-weighted distance constraints, relaxation iterations
//   - Candy = heavy terminal point shared by every rope
//   - Cutting = delete a constraint; swipe tested as segment–segment
//   - Stub retraction: cut rope's dangling part fades over ~0.5s
// Engine-independent math. The tuned constants port straight to Unity.
// ---------------------------------------------------------------------------

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  W = canvas.clientWidth; H = canvas.clientHeight;
  canvas.width = Math.round(W * DPR); canvas.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);

// ---- params (the four feel numbers + helpers) -----------------------------
const P = { segs:12, iters:16, damping:0.99, candyInvMass:0.05, gravity:1400, restLen:18, buoyancy:1.6 };
let candyEnveloped = false;

// ---- Verlet point ---------------------------------------------------------
function mkPoint(x, y, invMass) { return { x, y, px:x, py:y, rx:x, ry:y, im:invMass }; }

// ---- world ----------------------------------------------------------------
let candy = null;        // shared terminal point
let ropes = [];          // intact ropes + anchor-side stubs (permanent, no candy link)
let stubs = [];          // candy-side fading stubs: { pts:[], rest, t }
let bubbles = [];        // { x, y, r, popped:false, popT:-1, enveloped:false, wobble:rand }
let pops = [];           // pop VFX: { x, y, t }

function buildWorld() {
  ropes = [];
  stubs = [];
  bubbles = [];
  pops = [];
  candy = mkPoint(W * 0.5, H * 0.42, P.candyInvMass);
  addRopeAt(W * 0.30, H * 0.12);
  addRopeAt(W * 0.70, H * 0.12);
  addBubbleAt(W * 0.5, H * 0.68);
}

function addRopeAt(ax, ay) {
  const pts = [];
  // anchor point: invMass 0, pinned. Static position stored on the point.
  const anchor = mkPoint(ax, ay, 0);
  pts.push(anchor);
  const candyDist = Math.hypot(candy.x - ax, candy.y - ay);
  const rest = candyDist / P.segs;
  for (let i = 1; i < P.segs; i++) {
    const t = i / P.segs;
    pts.push(mkPoint(ax + (candy.x - ax) * t, ay + (candy.y - ay) * t, 1));
  }
  ropes.push({ anchor, pts, rest, cut:false });
}

function addBubbleAt(x, y) {
  bubbles.push({ x, y, r:26, popped:false, popT:-1, enveloped:false,
                 wobble: Math.random()*Math.PI*2, drift:0 });
}

// ---- simulation -----------------------------------------------------------
const FIXED_DT = 1/60;
let acc = 0;
let lastT = performance.now()/1000;

function step(dt) {
  // 1. snapshot render positions (DESIGN: pos -> renderPos at start of fixed step)
  for (const r of ropes) for (const p of r.pts) { p.rx = p.x; p.ry = p.y; }
  for (const s of stubs) for (const p of s.pts) { p.rx = p.x; p.ry = p.y; }
  candy.rx = candy.x; candy.ry = candy.y;

  // 1b. bubble envelop detection (DESIGN §1: candy enters radius -> enveloped).
  //     Sticky: once enveloped, stays attached until popped (can't drift out).
  //     Enveloped bubble tracks the candy; idle bubbles wobble in place.
  let enveloped = false;
  for (const b of bubbles) {
    if (b.popped) continue;
    if (!b.enveloped) {
      const dx = candy.x - b.x, dy = candy.y - b.y;
      if (dx*dx + dy*dy < b.r*b.r) b.enveloped = true;
    }
    if (b.enveloped) {
      enveloped = true;
      b.x = candy.x; b.y = candy.y;
    } else {
      b.drift += dt;
    }
  }
  candyEnveloped = enveloped;

  // 2. integrate Verlet
  const g = P.gravity;
  const d = P.damping;
  const integrate = (p) => {
    if (p.im === 0) return;
    const vx = (p.x - p.px) * d;
    const vy = (p.y - p.py) * d;
    p.px = p.x; p.py = p.y;
    p.x += vx; p.y += vy + g * dt * dt;
  };
  for (const r of ropes) for (const p of r.pts) integrate(p);
  for (const s of stubs) for (const p of s.pts) integrate(p);
  // candy — buoyancy when enveloped (DESIGN §2: gravity flipped per-point),
  // otherwise normal gravity. Net upward = (buoyancy-1)*g, gentle lift.
  {
    const vx = (candy.x - candy.px) * d;
    const vy = (candy.y - candy.py) * d;
    const gc = candyEnveloped ? -g * P.buoyancy : g;
    candy.px = candy.x; candy.py = candy.y;
    candy.x += vx; candy.y += vy + gc * dt * dt;
  }

  // 3. constraints: distance between consecutive pts; last pt -> candy
  for (let it = 0; it < P.iters; it++) {
    for (const r of ropes) {
      const pts = r.pts;
      // internal constraints keep the stub hanging from the anchor
      for (let i = 0; i < pts.length - 1; i++) solvePair(pts[i], pts[i+1], r.rest);
      // terminal constraint -> shared candy point; SKIP for cut ropes
      // (the candy is no longer attached once the rope is cut)
      if (!r.cut) solvePair(pts[pts.length - 1], candy, r.rest);
    }
    // fading candy-side stubs: keep internal constraints AND stay glued to
    // the candy so they swing with it and retract, then fade out.
    for (const s of stubs) {
      const pts = s.pts;
      for (let i = 0; i < pts.length - 1; i++) solvePair(pts[i], pts[i+1], s.rest);
      solvePair(pts[pts.length - 1], candy, s.rest);
    }
  }
}

function solvePair(a, b, rest) {
  let dx = b.x - a.x, dy = b.y - a.y;
  let dist = Math.hypot(dx, dy);
  if (dist < 1e-6) return;
  const wSum = a.im + b.im;
  if (wSum === 0) return;
  const err = (dist - rest) / dist;
  const ka = a.im / wSum, kb = b.im / wSum;
  a.x += dx * err * ka; a.y += dy * err * ka;
  b.x -= dx * err * kb; b.y -= dy * err * kb;
}

// ---- cutting: segment–segment intersection on interpolated positions -----
function segSeg(ax,ay,bx,by, cx,cy,dx,dy) {
  const r1x=bx-ax, r1y=by-ay, r2x=dx-cx, r2y=dy-cy;
  const denom = r1x*r2y - r1y*r2x;
  if (Math.abs(denom) < 1e-9) return null;
  const t = ((cx-ax)*r2y - (cy-ay)*r2x) / denom;
  const u = ((cx-ax)*r1y - (cy-ay)*r1x) / denom;
  if (t < 0 || t > 1 || u < 0 || u > 1) return null;
  return { x: ax + r1x*t, y: ay + r1y*t };
}

// each pointer is a cutter with its own segment history
const pointers = new Map(); // id -> {x,y,cutPts:[{x,y}]}

function applyCut(seg) {
  // seg tested against interpolated positions of each rope segment
  for (const r of ropes) {
    if (r.cut) continue;
    const pts = r.pts;
    for (let i = 0; i < pts.length - 1; i++) {
      const a = pts[i], b = pts[i+1];
      const hit = segSeg(seg.ax,seg.ay,seg.bx,seg.by, a.rx,a.ry,b.rx,b.ry)
               || segSeg(seg.ax,seg.ay,seg.bx,seg.by, a.x,a.y,b.x,b.y);
      if (hit) { cutRope(r, i, hit); return; }
    }
    // also the terminal segment rope-last -> candy
    const a = pts[pts.length-1];
    const hit = segSeg(seg.ax,seg.ay,seg.bx,seg.by, a.rx,a.ry,candy.rx,candy.ry)
             || segSeg(seg.ax,seg.ay,seg.bx,seg.by, a.x,a.y,candy.x,candy.y);
    if (hit) { cutRope(r, pts.length-1, hit); return; }
  }
}

function cutRope(r, atIndex, hit) {
  // Sever the constraint between atIndex and atIndex+1.
  // DESIGN §2 "Cutting aftermath":
  //   - upper part (anchor -> cut) hangs from anchor, stays visible (no fade)
  //   - lower part (cut -> candy) stays GLUED to the candy, swings with it,
  //     and retracts/fades over ~0.5s. It must not flail off the candy.
  //   - stubs are not cuttable (r.cut removes them from the test set)
  r.cut = true;
  r.hit = hit;
  const lowerPts = r.pts.slice(atIndex + 1);   // candy-side (may be empty if cut at last)
  r.pts = r.pts.slice(0, atIndex + 1);          // anchor-side stub, kept permanently

  if (lowerPts.length > 0) {
    // Give the top of the lower stub a free point (was the cut neighbor) so
    // it has a dangling tip; it stays attached to the candy via its terminal
    // constraint and retracts toward the candy as it fades.
    stubs.push({ pts: lowerPts, rest: r.rest, t: 0 });
  }
}

// ---- stub fade / cleanup --------------------------------------------------
function updateRopes(dt) {
  // age fading candy-side stubs; remove when expired
  for (let i = stubs.length - 1; i >= 0; i--) {
    stubs[i].t += dt;
    if (stubs[i].t > 0.5) stubs.splice(i, 1);
  }
  // pop VFX aging
  for (let i = pops.length - 1; i >= 0; i--) {
    pops[i].t += dt;
    if (pops[i].t > 0.3) pops.splice(i, 1);
  }
  // popped bubble fade-out timer
  for (const b of bubbles) {
    if (b.popped && b.popT >= 0) {
      b.popT += dt;
      if (b.popT > 0.3) b.popT = -1;
    }
  }
}

function popBubble(b) {
  if (b.popped) return;
  b.popped = true;
  b.enveloped = false;
  b.popT = 0;
  pops.push({ x: b.x, y: b.y, t: 0 });
}

// ---- input ----------------------------------------------------------------
function pointerPos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}
// tap-vs-swipe (DESIGN §3): if a pointer pops a bubble, it must not also cut.
// pointInBubble + segment-vs-circle for swipe-through pops.
function pointInBubble(x, y) {
  for (const b of bubbles) {
    if (b.popped) continue;
    const dx = x - b.x, dy = y - b.y;
    if (dx*dx + dy*dy < b.r*b.r) return b;
  }
  return null;
}
function segHitsBubble(ax, ay, bx, by) {
  for (const b of bubbles) {
    if (b.popped) continue;
    // closest point on segment to bubble center
    const dx = bx-ax, dy = by-ay;
    const len2 = dx*dx + dy*dy;
    let t = len2 < 1e-6 ? 0 : ((b.x-ax)*dx + (b.y-ay)*dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const cx = ax + dx*t, cy = ay + dy*t;
    const ex = cx - b.x, ey = cy - b.y;
    if (ex*ex + ey*ey < b.r*b.r) return b;
  }
  return null;
}

canvas.addEventListener('pointerdown', e => {
  canvas.setPointerCapture(e.pointerId);
  const p = pointerPos(e);
  const ptr = { x:p.x, y:p.y, px:p.x, py:p.y, noCut:false };
  pointers.set(e.pointerId, ptr);
  // tap on a bubble pops it (and disables cutting for this touch)
  const b = pointInBubble(p.x, p.y);
  if (b) { popBubble(b); ptr.noCut = true; ptr.px = null; }
});
canvas.addEventListener('pointermove', e => {
  if (!pointers.has(e.pointerId)) return;
  const p = pointerPos(e);
  const ptr = pointers.get(e.pointerId);
  // first frame of a touch has no previous position -> no segment (DESIGN §3)
  if (ptr.px !== null && !ptr.noCut) {
    // a swipe passing through a bubble also pops it (and stops cutting)
    const b = segHitsBubble(ptr.px, ptr.py, p.x, p.y);
    if (b) { popBubble(b); ptr.noCut = true; }
    else applyCut({ ax:ptr.px, ay:ptr.py, bx:p.x, by:p.y });
  }
  ptr.px = p.x; ptr.py = p.y; ptr.x = p.x; ptr.y = p.y;
});
canvas.addEventListener('pointerup', e => { pointers.delete(e.pointerId); });
canvas.addEventListener('pointercancel', e => { pointers.delete(e.pointerId); });

// ---- rendering ------------------------------------------------------------
function lerp(a,b,t){ return a + (b-a)*t; }

function render(alpha) {
  ctx.clearRect(0,0,W,H);
  // anchors — always draw (anchor-side stubs hang from these permanently)
  for (const r of ropes) drawAnchor(r.anchor.x, r.anchor.y);

  // ropes: intact ropes + permanent anchor-side stubs (no fade)
  ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = '#c8a268';
  for (const r of ropes) {
    const pts = r.pts;
    if (pts.length < 2) {
      // single anchor point left — nothing to draw
      continue;
    }
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) {
      const p = pts[i];
      ctx.lineTo(lerp(p.rx, p.x, alpha), lerp(p.ry, p.y, alpha));
    }
    // to candy — only intact ropes still connect to the candy.
    if (!r.cut) {
      ctx.lineTo(lerp(candy.rx, candy.x, alpha), lerp(candy.ry, candy.y, alpha));
    }
    ctx.stroke();
  }

  // fading candy-side stubs: still glued to candy, retract & fade over 0.5s
  for (const s of stubs) {
    const pts = s.pts;
    if (pts.length < 1) continue;
    const fade = 1 - (s.t / 0.5);
    ctx.globalAlpha = Math.max(0, fade);
    ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = '#c8a268';
    ctx.beginPath();
    ctx.moveTo(lerp(pts[0].rx, pts[0].x, alpha), lerp(pts[0].ry, pts[0].y, alpha));
    for (let i = 1; i < pts.length; i++) {
      const p = pts[i];
      ctx.lineTo(lerp(p.rx, p.x, alpha), lerp(p.ry, p.y, alpha));
    }
    // stays attached to the candy while fading
    ctx.lineTo(lerp(candy.rx, candy.x, alpha), lerp(candy.ry, candy.y, alpha));
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  // candy
  const cx = lerp(candy.rx, candy.x, alpha), cy = lerp(candy.ry, candy.y, alpha);
  ctx.fillStyle = '#e85a4f';
  ctx.beginPath(); ctx.arc(cx, cy, 16, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#fff3'; ctx.lineWidth = 2; ctx.stroke();

  // bubbles — drawn over the candy so the candy shows through translucently.
  // Idle bubbles wobble (sine breathing); enveloped bubble tracks the candy.
  const now = performance.now()/1000;
  for (const b of bubbles) {
    if (b.popped && b.popT < 0) continue;
    let bx = b.x, by = b.y, rr = b.r;
    let alphaMul = 1;
    if (b.popped) {
      // quick pop shrink + fade
      const k = b.popT / 0.3;
      rr = b.r * (1 + k*0.6);
      alphaMul = 1 - k;
    } else if (!b.enveloped) {
      // idle breathing wobble
      const w = Math.sin(now*2 + b.wobble);
      rr = b.r + w*1.5;
      by = b.y + Math.sin(now*1.3 + b.wobble)*2;
    }
    // translucent body
    ctx.globalAlpha = 0.35 * alphaMul;
    ctx.fillStyle = '#9fd0ff';
    ctx.beginPath(); ctx.arc(bx, by, rr, 0, Math.PI*2); ctx.fill();
    // outline
    ctx.globalAlpha = 0.9 * alphaMul;
    ctx.strokeStyle = '#cfeaff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(bx, by, rr, 0, Math.PI*2); ctx.stroke();
    // highlight glint
    ctx.globalAlpha = 0.8 * alphaMul;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(bx - rr*0.35, by - rr*0.35, rr*0.18, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // pop VFX — expanding ring + fading sparkles
  for (const p of pops) {
    const k = p.t / 0.3;
    const rad = 26 + k*22;
    ctx.globalAlpha = 1 - k;
    ctx.strokeStyle = '#cfeaff'; ctx.lineWidth = 3 * (1-k);
    ctx.beginPath(); ctx.arc(p.x, p.y, rad, 0, Math.PI*2); ctx.stroke();
    // little sparkle dots
    for (let i = 0; i < 6; i++) {
      const a = i/6 * Math.PI*2 + k;
      const sx = p.x + Math.cos(a)*rad, sy = p.y + Math.sin(a)*rad;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(sx, sy, 2*(1-k), 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // cut trails
  ctx.strokeStyle = '#6cf'; ctx.lineWidth = 2; ctx.lineCap='round';
  for (const ptr of pointers.values()) {
    if (ptr.px !== null) {
      ctx.beginPath(); ctx.moveTo(ptr.px, ptr.py); ctx.lineTo(ptr.x, ptr.y); ctx.stroke();
    }
  }
}

function drawAnchor(x, y) {
  ctx.fillStyle = '#9ab';
  ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#444'; ctx.lineWidth = 2; ctx.stroke();
}

// ---- main loop ------------------------------------------------------------
function frame(now) {
  const t = now/1000;
  let dt = t - lastT; lastT = t;
  if (dt > 0.1) dt = 0.1; // clamp (DESIGN: max timestep)
  acc += dt;
  while (acc >= FIXED_DT) { step(FIXED_DT); updateRopes(FIXED_DT); acc -= FIXED_DT; }
  const alpha = acc / FIXED_DT;
  render(alpha);
  requestAnimationFrame(frame);
}

// ---- UI wiring ------------------------------------------------------------
function bindRange(id, fn, fmt) {
  const el = document.getElementById(id), v = document.getElementById(id+'V');
  const apply = () => { fn(+el.value); v.textContent = fmt(); };
  el.addEventListener('input', apply); apply();
}
bindRange('segs',  v => { P.segs = v; rebuildRopes(); }, () => P.segs);
bindRange('iters', v => P.iters = v, () => P.iters);
bindRange('damp',  v => P.damping = v/100, () => (P.damping).toFixed(2));
bindRange('cim',   v => P.candyInvMass = v/100, () => P.candyInvMass.toFixed(2));
bindRange('grav',  v => P.gravity = v, () => P.gravity);
bindRange('buoy',  v => P.buoyancy = v/100, () => P.buoyancy.toFixed(2));

// rebuild rope chains (preserving anchor positions) when segment count changes
function rebuildRopes() {
  const anchors = ropes.map(r => ({ x:r.anchor.x, y:r.anchor.y }));
  ropes = [];
  stubs = [];
  for (const a of anchors) addRopeAt(a.x, a.y);
}

document.getElementById('reset').onclick = () => { resize(); buildWorld(); };
document.getElementById('addRope').onclick = () => {
  addRopeAt(W * (0.2 + Math.random()*0.6), H * 0.12);
};
document.getElementById('addBubble').onclick = () => {
  addBubbleAt(W * (0.25 + Math.random()*0.5), H * (0.55 + Math.random()*0.3));
};

resize();
buildWorld();
requestAnimationFrame(frame);
</script>
</body>
</html>
